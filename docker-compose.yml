services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: pixelslot-storefront:latest
    container_name: pixelslot-storefront
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      # node fetch, not wget/curl — neither exists in node:*-slim (the old wget
      # probe reported unhealthy forever). Same pattern as backend/Dockerfile.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: pixelslot-storefront:dev
    container_name: pixelslot-storefront-dev
    restart: unless-stopped
    ports:
      - '${DEV_PORT:-3001}:3000'
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
