# DigitalOcean App Platform spec — polycards-backend (Mercur/Medusa).
#
# COMMITTED IaC (single source of truth). The 4 secret env values are redacted
# (placeholder tokens); the real values live in gitignored deploy/.env.deploy
# and are injected at apply time by scripts/do-apply.ps1. Never put a real
# secret in this file.
#
#   Validate (no live change):  pwsh scripts/do-apply.ps1 backend -Validate
#   Apply (redeploys prod):     pwsh scripts/do-apply.ps1 backend
#
# This file mirrors LIVE steady state. Edit here first, then apply — do not edit
# the app in the DO UI (that causes drift).
#
# Components all build from backend/Dockerfile (build context = backend/):
#   - service "backend" : Medusa web (API + /dashboard + /seller), MEDUSA_WORKER_MODE=server
#   - worker  "worker"  : drains event/workflow queues, MEDUSA_WORKER_MODE=worker
#   - job     "migrate" : PRE_DEPLOY `deploy:migrate-user` (db:migrate + idempotent
#                         create-admin) — runs every deploy, ensures the admin user
#                         exists. create-admin.ts checks for an existing user and
#                         SKIPS (no throw), so re-running is safe and self-healing.
#                         ADMIN_EMAIL/ADMIN_PASSWORD below feed it.
# Must match the LIVE app name, or `doctl apps update --spec` renames the app.
# App recreated 2026-07-16; default hostname is now polycards-backend-gce6p
# (DO assigns it at creation with a random suffix — unrelated to the app name).
name: polycards-backend
region: sgp

# Custom domain — REQUIRED here: `doctl apps update` replaces the FULL spec, so
# omitting this block would detach the domain. Serves the store API plus the
# dashboards (admin.polycards.gg/dashboard, /seller). DNS is a grey-cloud
# (DNS-only) CNAME in Cloudflare → polycards-backend-gce6p.ondigitalocean.app.
domains:
  - domain: admin.polycards.gg
    type: PRIMARY
    zone: polycards.gg

# App Platform alerts → email on failed deploys / failed custom-domain certs.
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# App-level envs are inherited by every component below.
envs:
  - key: NODE_ENV
    scope: RUN_AND_BUILD_TIME
    value: production
  # Baked into the admin/vendor vite bundles at BUILD time (Dockerfile ARG ->
  # ENV -> yarn build). Must be this app's own public origin so the dashboards
  # (served at /dashboard, /seller) call the same backend. Without it they ship
  # pointing at localhost:9000 -> blank/black dashboard.
  - key: MERCUR_BACKEND_URL
    scope: BUILD_TIME
    value: https://admin.polycards.gg
  # Storefront origin. BUILD: baked into the admin bundle (vite __STOREFRONT_URL__)
  # so the admin resolves storefront-relative asset paths against the real
  # storefront domain. RUN: read by the /cdn/cards redirect route. Also defaulted
  # in backend/Dockerfile (build) + the route (run) since App Platform doesn't
  # reliably pass build-time env.
  - key: MERCUR_STOREFRONT_URL
    scope: RUN_AND_BUILD_TIME
    value: https://polycards.gg
  # Storefront origin for links the BACKEND generates and emails (password reset —
  # subscribers/password-reset.ts) and for bake-slab's storefront-relative asset
  # resolution. Distinct from MERCUR_STOREFRONT_URL above, which Mercur reads under
  # its own name; both point at the same origin. Added 2026-07-17: without it the
  # subscriber's dev fallback (http://localhost:4000) would have gone out in every
  # production reset email, dead on arrival and burning the single-use token. The
  # subscriber now refuses to send when this is unset, so a missing value degrades to
  # a warn rather than garbage — but it must be present for reset email to work at
  # all. App level so the WORKER (which runs the subscriber) gets it too.
  - key: STOREFRONT_URL
    scope: RUN_TIME
    value: https://polycards.gg
  # Explicit PUBLIC endpoints (not the ${cluster.DATABASE_URL} binding): on an
  # attached production cluster the binding resolves to the PRIVATE host, which
  # the app (not in the DB's VPC) can't reach -> KnexTimeoutError. The public
  # host + the narrow `app:$APP_ID` trusted source is the "Public only" pattern.
  # No ?sslmode=require in the URL — the framework can't strip it and it would
  # force strict cert verify, defeating databaseDriverOptions.connection.ssl.
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__DATABASE_URL__
  - key: REDIS_URL
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__REDIS_URL__
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__JWT_SECRET__
  - key: COOKIE_SECRET
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__COOKIE_SECRET__
  # Super-admin for /dashboard login, created idempotently by the migrate job's
  # deploy:migrate-user (create-admin.ts). Skipped if the user already exists.
  - key: ADMIN_EMAIL
    scope: RUN_TIME
    value: admin@pokenic.app
  - key: ADMIN_PASSWORD
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__ADMIN_PASSWORD__
  # CORS — explicit origins, comma-separated, no trailing slashes. The
  # dashboards are same-origin when opened on admin.polycards.gg (their bundles
  # call MERCUR_BACKEND_URL = that host); the app's own default hostname is also
  # listed so direct-to-default-host access still works. (The former `${APP_URL}`
  # literal was never a valid App Platform bindable — it only "worked" because
  # same-origin requests skip CORS.)
  - key: ADMIN_CORS
    scope: RUN_TIME
    value: https://admin.polycards.gg,https://polycards-backend-gce6p.ondigitalocean.app
  - key: AUTH_CORS
    scope: RUN_TIME
    value: https://admin.polycards.gg,https://polycards-backend-gce6p.ondigitalocean.app,https://polycards.gg,https://www.polycards.gg
  - key: VENDOR_CORS
    scope: RUN_TIME
    value: https://admin.polycards.gg,https://polycards-backend-gce6p.ondigitalocean.app
  - key: STORE_CORS
    scope: RUN_TIME
    value: https://polycards-storefront-fzrft.ondigitalocean.app,https://polycards.gg,https://www.polycards.gg
  # Object storage (DO Spaces, sgp1) — durable media. Without these the backend
  # falls back to the LOCAL file provider (medusa-config.ts s3Configured gate),
  # which writes to the container's EPHEMERAL disk and loses every upload on
  # redeploy/restart. S3_FILE_URL is the bucket's CDN host (public read). The two
  # key values are SECRET, injected from deploy/.env.deploy at apply time.
  - key: S3_BUCKET
    scope: RUN_TIME
    value: polycards-media
  - key: S3_REGION
    scope: RUN_TIME
    value: sgp1
  - key: S3_ENDPOINT
    scope: RUN_TIME
    value: https://sgp1.digitaloceanspaces.com
  - key: S3_FILE_URL
    scope: RUN_TIME
    value: https://polycards-media.sgp1.cdn.digitaloceanspaces.com
  - key: S3_ACCESS_KEY_ID
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__S3_ACCESS_KEY_ID__
  - key: S3_SECRET_ACCESS_KEY
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__S3_SECRET_ACCESS_KEY__
  # Google OAuth (storefront customer social login). All three are required for
  # the `google` auth provider to register (medusa-config.ts gates on them; a
  # missing one boots emailpass-only). CLIENT_ID + CALLBACK_URL are non-secret;
  # CLIENT_SECRET is injected from deploy/.env.deploy at apply time (do-apply.ps1
  # secret list). CALLBACK_URL is the default the storefront overrides per-request
  # with its own origin — it must match an Authorised redirect URI on the OAuth
  # client (Cloud project "polycards").
  - key: GOOGLE_CLIENT_ID
    scope: RUN_TIME
    value: 206640157304-h2jhoblti14pd96pik0im4l66s0a6o0v.apps.googleusercontent.com
  - key: GOOGLE_CLIENT_SECRET
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__GOOGLE_CLIENT_SECRET__
  - key: GOOGLE_CALLBACK_URL
    scope: RUN_TIME
    value: https://polycards.gg/auth/google/callback
  # ── Resend (transactional email: password reset) ─────────────────────────────
  # API_KEY + FROM_EMAIL are BOTH required to register the provider on the `email`
  # channel; with either unset the backend boots on the local/feed provider only and
  # password-reset emails are skipped with a warn (medusa-config.ts and the
  # subscriber share ONE predicate — modules/resend/options.ts — so a partial config
  # degrades to that warn instead of throwing NOT_FOUND inside an event handler).
  #
  # These sit at APP level, NOT under services.backend, and that is load-bearing:
  # the auth.password_reset subscriber runs on the WORKER component
  # (MEDUSA_WORKER_MODE=worker drains the event queue), not the web service. Scoping
  # them to the service would leave the worker unconfigured and silently skip every
  # reset email. App-level envs reach both components.
  #
  # FROM_EMAIL is on the send.* SUBDOMAIN so its SPF/DKIM stay clear of the root
  # domain's Google Workspace mail records (root MX -> smtp.google.com). REPLY_TO is
  # optional; without it, customer replies to a transactional email go nowhere.
  - key: RESEND_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: __SECRET__RESEND_API_KEY__
  - key: RESEND_FROM_EMAIL
    scope: RUN_TIME
    value: Polycards <noreply@send.polycards.gg>
  - key: RESEND_REPLY_TO
    scope: RUN_TIME
    value: support@polycards.gg
  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║ GO-LIVE BLOCKER — DELETE THIS ENV BEFORE REAL LAUNCH.                  ║
  # ║ 'unsafe-demo' runs the always-approving MOCK payment gateway in prod   ║
  # ║ (mints free spendable credit). Prod is deliberately a DEMO box today.  ║
  # ║ The boot guard (packs/topup.ts assertMockTopupSafe) refuses 'true' in  ║
  # ║ production; only this weird-on-purpose value boots. Remove when the    ║
  # ║ real PSP (security roadmap Batch B) ships. Living here (not the DO UI) ║
  # ║ keeps the spec = live reality and makes the blocker grep-able.         ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  - key: ALLOW_MOCK_TOPUP
    scope: RUN_TIME
    value: unsafe-demo

services:
  - name: backend
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: elstonyth/Polycards
      branch: master
      deploy_on_push: true
    http_port: 9000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
    alerts:
      - rule: CPU_UTILIZATION
        value: 80
        operator: GREATER_THAN
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        value: 85
        operator: GREATER_THAN
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        value: 5
        operator: GREATER_THAN
        window: FIVE_MINUTES
    envs:
      - key: MEDUSA_WORKER_MODE
        scope: RUN_TIME
        value: server

workers:
  - name: worker
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: elstonyth/Polycards
      branch: master
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: corepack yarn start
    envs:
      - key: MEDUSA_WORKER_MODE
        scope: RUN_TIME
        value: worker

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: elstonyth/Polycards
      branch: master
    instance_size_slug: basic-xxs
    run_command: corepack yarn deploy:migrate-user

databases:
  - name: polycards-pg
    engine: PG
    production: true
    cluster_name: polycards-pg
  # Valkey is attached with engine REDIS (redis-compatible) — App Platform only
  # resolves the binding under the REDIS enum. REDIS_URL is set explicitly above.
  - name: polycards-valkey
    engine: REDIS
    production: true
    cluster_name: polycards-valkey
