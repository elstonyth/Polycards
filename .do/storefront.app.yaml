# DigitalOcean App Platform spec — polycards-storefront (Next.js 16).
#
# COMMITTED IaC (single source of truth). No secrets here: the backend URL and
# the publishable key are NEXT_PUBLIC_* (public by design) and are baked at
# BUILD time, so the backend must already be live before a build.
#
#   Validate (no live change):  pwsh scripts/do-apply.ps1 storefront -Validate
#   Apply (redeploys prod):     pwsh scripts/do-apply.ps1 storefront
#
# Edit here first, then apply — do not edit the app in the DO UI (drift).
# Must match the LIVE app name, or `doctl apps update --spec` renames the app.
# App recreated 2026-07-16; default hostname is now polycards-storefront-fzrft
# (DO assigns it at creation with a random suffix — unrelated to the app name).
name: polycards-storefront
region: sgp

# Custom domains — REQUIRED here: `doctl apps update` replaces the FULL spec,
# so omitting this block would detach polycards.gg from the app. DNS lives in
# Cloudflare as grey-cloud (DNS-only) CNAMEs to the default ondigitalocean host.
domains:
  - domain: polycards.gg
    type: PRIMARY
  - domain: www.polycards.gg
    type: ALIAS
    zone: polycards.gg

# App Platform alerts → email on failed deploys / failed custom-domain certs.
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: storefront
    dockerfile_path: Dockerfile
    github:
      repo: elstonyth/Polycards
      branch: master
      deploy_on_push: true
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /healthz
    alerts:
      - rule: CPU_UTILIZATION
        value: 80
        operator: GREATER_THAN
        window: FIVE_MINUTES
      - rule: MEM_UTILIZATION
        value: 85
        operator: GREATER_THAN
        window: FIVE_MINUTES
      - rule: RESTART_COUNT
        value: 5
        operator: GREATER_THAN
        window: FIVE_MINUTES
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      # NOTE(custom-domain): this URL/key pair is ALSO hardcoded as ARG defaults
      # in the root Dockerfile (NEXT_PUBLIC_*) and backend/Dockerfile
      # (MERCUR_BACKEND_URL / MERCUR_STOREFRONT_URL) — App Platform doesn't
      # reliably pass build-time env, so the Dockerfile defaults ARE the prod
      # values. A domain move must update all of them together.
      - key: NEXT_PUBLIC_MEDUSA_BACKEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://admin.polycards.gg
      - key: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        value: pk_86273b7c12ca5b2fd838bf1c1cf6427dbb6ef41c723d8af1efa20db183517534
      # Canonical public origin (invite links, metadataBase, sitemap). Also an
      # ARG default in the root Dockerfile — App Platform doesn't reliably pass
      # build-time env, so the Dockerfile default is what actually bakes in.
      # Set to the live DO host; on a custom-domain move update this + the
      # Dockerfile ARG + backend MERCUR_STOREFRONT_URL together.
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://polycards.gg
      # Enforce the CSP. Without this, next.config.ts serves
      # Content-Security-Policy-Report-Only — report-only had a clean run
      # (qa:csp + Sentry), flip assessed safe. GO-LIVE checklist: must be true.
      # NOTE: takes effect on the next `do-apply.ps1 storefront` (spec envs
      # apply via doctl, not on git push).
      - key: CSP_ENFORCE
        scope: RUN_AND_BUILD_TIME
        value: 'true'
      # Spaces CDN media host — baked into the client bundle (next.config.ts
      # remotePatterns) so next/image renders uploaded card/pack art from the
      # bucket. Host only, no protocol. Must rebuild the storefront to change it.
      - key: NEXT_PUBLIC_MEDIA_HOST
        scope: RUN_AND_BUILD_TIME
        value: polycards-media.sgp1.cdn.digitaloceanspaces.com
