<!doctype html>
<meta charset="utf-8" />
<title>PixelSlot — Live Sim (voxel)</title>
<style>
  :root {
    color-scheme: dark;
  }
  * {
    margin: 0;
    box-sizing: border-box;
  }
  html,
  body {
    height: 100%;
    overflow: hidden;
    background: #0b0c1a;
    color: #eef0ff;
    font:
      13px/1.45 ui-monospace,
      SFMono-Regular,
      Menlo,
      monospace;
  }
  #scene {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .lbl {
    color: #dfe4ff;
    font:
      600 12px/1 ui-monospace,
      monospace;
    text-shadow: 0 1px 4px #000;
    padding: 2px 6px;
    background: rgba(10, 10, 26, 0.6);
    border-radius: 5px;
    white-space: nowrap;
  }
  .lbl.station {
    color: #7cf3ff;
    letter-spacing: 0.14em;
    font-size: 10px;
    background: none;
    text-shadow:
      0 0 8px rgba(70, 220, 255, 0.7),
      0 1px 4px #000;
  }
  #side {
    position: fixed;
    top: 0;
    right: 0;
    width: 310px;
    height: 100vh;
    background: rgba(9, 10, 22, 0.82);
    backdrop-filter: blur(9px);
    border-left: 1px solid #23243a;
    padding: 14px;
    overflow-y: auto;
  }
  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #7a7fb0;
    margin: 16px 0 6px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 3px 0;
    align-items: center;
  }
  .dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 2px;
    margin-right: 7px;
    box-shadow: 0 0 8px currentColor;
  }
  .muted {
    color: #7a7fb0;
  }
  #findings .f {
    padding: 5px 7px;
    margin: 4px 0;
    border-radius: 5px;
    background: #14152a;
    font-size: 12px;
  }
  .sev-critical {
    border-left: 3px solid #ff3d6e;
  }
  .sev-high {
    border-left: 3px solid #ff9f43;
  }
  .sev-medium {
    border-left: 3px solid #ffd166;
  }
  .sev-low {
    border-left: 3px solid #6b7280;
  }
  #day {
    font-size: 20px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(124, 243, 255, 0.4);
  }
  #badge {
    position: fixed;
    left: 12px;
    top: 11px;
    font-size: 11px;
    color: #7cf3ff;
    background: rgba(9, 10, 22, 0.7);
    padding: 4px 9px;
    border-radius: 6px;
    border: 1px solid #23243a;
    text-shadow: 0 0 8px rgba(70, 220, 255, 0.6);
  }
  #hint {
    position: fixed;
    left: 12px;
    bottom: 10px;
    color: #565b86;
    font-size: 11px;
  }
</style>
<canvas id="scene"></canvas>
<div id="badge">PIXELSLOT · live sim · voxel</div>
<div
  id="fps"
  style="
    position: fixed;
    left: 12px;
    top: 40px;
    font-size: 11px;
    color: #7cf3ff;
    background: rgba(9, 10, 22, 0.7);
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #23243a;
  "
>
  — fps
</div>
<aside id="side">
  <div id="day">Day —</div>
  <h2>Customers</h2>
  <div id="customers" class="muted">waiting for arrivals…</div>
  <h2>Admin queue (<span id="qdepth">0</span>)</h2>
  <div id="queue" class="muted">empty</div>
  <h2>Findings</h2>
  <div id="findings" class="muted">none yet</div>
</aside>
<div id="hint">drag to orbit · scroll to zoom · right-drag to pan</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
</script>
<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import {
    CSS2DRenderer,
    CSS2DObject,
  } from 'three/addons/renderers/CSS2DRenderer.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // Neon palette (cyberpunk): pink, cyan, purple, amber, blue
  const NE = {
    pink: 0xff2e88,
    cyan: 0x2ee6ff,
    purple: 0x9a5cff,
    amber: 0xffb02e,
    blue: 0x3a7bff,
    green: 0x37f5a0,
  };

  // ---- Walkable stations on the street (x,z). In sync w/ choreography.mjs ----
  const S = {
    entrance: { x: 0, z: -1.5 },
    slot1: { x: -7, z: 1 },
    slot2: { x: -7, z: 4.5 },
    slot3: { x: -7, z: 8 },
    vault: { x: 6.5, z: 0.5 },
    desk: { x: 6, z: 6 },
    kiosk: { x: 0, z: 4.5 },
  };
  function targetFor(e) {
    switch (e.kind) {
      case 'played_pack':
        return { s: S[e.detail?.slot] || S.slot1, mood: 'busy' };
      case 'pull_result':
        return {
          s: S.slot1,
          mood: e.detail?.rarity === 'legendary' ? 'happy' : 'neutral',
        };
      case 'complained':
        return { s: S.desk, mood: 'angry' };
      case 'admin_picked_up':
      case 'admin_resolved':
        return { s: S.desk, mood: 'busy' };
      default:
        return { s: S.entrance, mood: 'neutral' };
    }
  }
  const MOOD = {
    neutral: 0xe9ecff,
    happy: NE.green,
    angry: NE.pink,
    busy: NE.cyan,
  };
  const PALETTE = [
    NE.green,
    NE.pink,
    NE.purple,
    NE.amber,
    NE.cyan,
    0xff7a3d,
    0xff5cc8,
    0x59d0ff,
  ];

  // ---- Renderers -------------------------------------------------------------
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.34;

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(innerWidth, innerHeight);
  Object.assign(labelRenderer.domElement.style, {
    position: 'fixed',
    top: '0',
    left: '0',
    pointerEvents: 'none',
  });
  document.body.appendChild(labelRenderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0f22);
  scene.fog = new THREE.Fog(0x0d0f22, 40, 78);
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.03).texture;

  // near-isometric perspective
  const camera = new THREE.PerspectiveCamera(
    30,
    innerWidth / innerHeight,
    0.1,
    400,
  );
  camera.position.set(28, 24, 30);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 2, 3);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI * 0.49;
  controls.minDistance = 16;
  controls.maxDistance = 80;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    0.45,
    0.7,
    0.88,
  );
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  // ---- Lighting: dark cyberpunk (moody key + cool fill + neon point lights) --
  scene.add(new THREE.HemisphereLight(0x3a4a80, 0x0a0a16, 0.07));
  scene.add(new THREE.AmbientLight(0x2a2c4a, 0.08));
  const key = new THREE.DirectionalLight(0x9fb4ff, 0.2);
  key.position.set(14, 26, 10);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  Object.assign(key.shadow.camera, {
    left: -28,
    right: 28,
    top: 28,
    bottom: -28,
  });
  key.shadow.bias = -0.0004;
  scene.add(key);

  // ---- Voxel helpers ---------------------------------------------------------
  const boxMat = (color, o = {}) =>
    new THREE.MeshStandardMaterial({
      color,
      roughness: 0.92,
      metalness: 0.04,
      flatShading: true,
      envMapIntensity: 0.12,
      ...o,
    });
  const neonMat = (color, i = 2.8) =>
    boxMat(0x0e1018, {
      emissive: color,
      emissiveIntensity: i,
      roughness: 0.35,
    });
  function box(w, h, d, color, o = {}) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), boxMat(color, o));
    m.castShadow = m.receiveShadow = true;
    return m;
  }
  function place(w, h, d, color, x, y, z, o = {}) {
    const m = box(w, h, d, color, o);
    m.position.set(x, y, z);
    scene.add(m);
    return m;
  }
  // a neon block + a soft point light so it actually lights the scene
  const neonLights = [];
  function neon(w, h, d, color, x, y, z, lightP = 0.6) {
    const m = box(w, h, d, 0x0e1018, {
      emissive: color,
      emissiveIntensity: 2.8,
      roughness: 0.35,
    });
    m.position.set(x, y, z);
    scene.add(m);
    // Cap the real point lights hard — too many tanks the framerate (drag lag).
    // Emissive + bloom carry the glow; a handful of fill lights is plenty.
    if (lightP > 0 && neonLights.length < 5) {
      const L = new THREE.PointLight(color, lightP, 10, 2);
      L.position.set(x, y, z + 0.4);
      scene.add(L);
      neonLights.push(L);
    }
    return m;
  }

  // ---- Street base -----------------------------------------------------------
  place(26, 0.6, 20, 0x14152a, 0, -0.3, 4, { roughness: 0.98 }); // road slab
  place(26, 0.02, 20, 0x1a1c34, 0, 0.02, 4, { roughness: 0.9 }); // top face
  neon(26, 0.08, 0.18, NE.amber, 0, 0.06, 13.6, 0.4); // curb line (amber)
  neon(0.18, 0.08, 20, NE.cyan, -12.6, 0.06, 4, 0.3); // side strip (cyan)
  // faint floor grid
  const grid = new THREE.GridHelper(26, 26, 0x223, 0x181a30);
  grid.position.set(0, 0.05, 4);
  scene.add(grid);

  // ---- The PixelSlot arcade building (voxel, cyberpunk) ----------------------
  (function building() {
    const wall = 0x24263e,
      wall2 = 0x1d1f33,
      dark = 0x141525,
      trim = 0x2c2f4c;
    // ground floor block
    place(17, 5, 4, wall, 0, 2.5, -8);
    place(17, 0.5, 4.4, trim, 0, 5.05, -8); // floor divider
    // second floor (setback)
    place(14.5, 4.5, 3.4, wall2, 0, 7.3, -8.6);
    place(14.5, 0.6, 3.8, trim, 0, 9.7, -8.6); // roof lip
    // rooftop units
    place(3, 1.2, 2, dark, -3.5, 10.5, -9);
    place(2.2, 0.9, 1.6, dark, 2.5, 10.3, -9);
    for (let i = 0; i < 4; i++)
      neon(0.22, 0.22, 0.22, NE.amber, 5 + i * 0.6, 10.2, -7.4, 0.15);
    // AC / side units + pipes
    place(1.6, 2.4, 1.2, dark, 8.9, 3, -7);
    place(1.4, 1.4, 1, dark, 8.9, 7.2, -8);
    place(0.5, 5.5, 0.5, trim, 8.6, 3.2, -6.2); // pipe
    // ---- neon facade ----
    // big PIXELSLOT sign band on 2nd floor
    for (let i = 0; i < 11; i++)
      neon(0.55, 0.7, 0.15, i % 2 ? NE.cyan : NE.pink, -5 + i, 7.8, -6.8, 0.5);
    // window strips ground floor (blue glow interiors)
    for (const gx of [-5.5, -2.5, 2, 5]) {
      neon(2, 2.4, 0.1, NE.blue, gx, 3.1, -6.0, 0.35);
    }
    // vertical neon accents (pink / purple) like the reference
    neon(0.28, 3.2, 0.15, NE.pink, -7.6, 2.6, -6, 0.6);
    neon(0.28, 2.6, 0.15, NE.purple, 7.6, 3.0, -6, 0.6);
    // amber sign box + magenta under-glow near the door
    neon(1.2, 0.5, 0.12, NE.amber, 4.2, 4.0, -6, 0.4);
    neon(2.4, 0.12, 0.12, NE.pink, 0, 0.9, -5.6, 0.5);
    // door recess
    place(3, 3.2, 0.4, 0x0c0d18, 0, 1.7, -5.9);
    place(0.15, 3.2, 0.6, NE.cyan, -1.4, 1.7, -5.7, {
      emissive: NE.cyan,
      emissiveIntensity: 1.6,
    });
    place(0.15, 3.2, 0.6, NE.cyan, 1.4, 1.7, -5.7, {
      emissive: NE.cyan,
      emissiveIntensity: 1.6,
    });
  })();

  // ---- Stations on the street ------------------------------------------------
  const screens = [];
  function cabinet(pos, hue) {
    const g = new THREE.Group();
    g.position.set(pos.x, 0, pos.z);
    g.add(box(1.6, 3, 1.3, 0x1b1d31).translateY(1.5));
    const sc = box(1.25, 1.15, 0.1, 0x0e1018, {
      emissive: hue,
      emissiveIntensity: 2.1,
      roughness: 0.3,
    });
    sc.position.set(0, 2, 0.68);
    g.add(sc);
    const L = new THREE.PointLight(hue, 0.7, 8, 2);
    L.position.set(0, 2.1, 1.3);
    g.add(L);
    neonLights.push(L);
    scene.add(g);
    screens.push(sc);
  }
  cabinet(S.slot1, NE.purple);
  cabinet(S.slot2, NE.cyan);
  cabinet(S.slot3, NE.pink);
  stationLabel('SLOTS', { x: S.slot2.x, z: S.slot2.z - 1.6 }, 3.6);

  // vault (voxel safe)
  (() => {
    const g = new THREE.Group();
    g.position.set(S.vault.x, 0, S.vault.z);
    g.add(box(2.6, 3, 1.9, 0x22243c).translateY(1.5));
    const door = box(1.5, 1.5, 0.14, 0x0e1018, {
      emissive: NE.amber,
      emissiveIntensity: 1.6,
      metalness: 0.3,
    });
    door.position.set(0, 1.6, 0.98);
    g.add(door);
    const L = new THREE.PointLight(NE.amber, 0.5, 7, 2);
    L.position.set(0, 1.6, 1.6);
    g.add(L);
    neonLights.push(L);
    scene.add(g);
    stationLabel('VAULT', S.vault, 3.4);
  })();

  // admin booth
  (() => {
    const g = new THREE.Group();
    g.position.set(S.desk.x, 0, S.desk.z);
    g.add(box(3, 1.2, 1.7, 0x1c1e33).translateY(0.6));
    const sign = box(2, 0.5, 0.12, 0x0e1018, {
      emissive: NE.cyan,
      emissiveIntensity: 2,
    });
    sign.position.set(0, 2.2, 0.2);
    g.add(sign);
    g.add(
      box(1.2, 0.85, 0.08, 0x0e1018, {
        emissive: NE.blue,
        emissiveIntensity: 1.6,
      })
        .translateY(1.55)
        .translateZ(0.1)
        .translateX(0.2),
    );
    scene.add(g);
    const adm = person(0x9aa2d8, 'admin');
    adm.group.position.set(S.desk.x + 1.2, 0, S.desk.z);
    adm.group.scale.y = 0.85;
    stationLabel('ADMIN', S.desk, 3.0);
  })();

  // central kiosk (vending / holo pillar)
  (() => {
    const g = new THREE.Group();
    g.position.set(S.kiosk.x, 0, S.kiosk.z);
    g.add(box(1.2, 3.2, 1.2, 0x1a1c30).translateY(1.6));
    g.add(
      box(0.9, 0.9, 0.08, 0x0e1018, { emissive: NE.pink, emissiveIntensity: 2 })
        .translateY(2.1)
        .translateZ(0.62),
    );
    const L = new THREE.PointLight(NE.pink, 0.45, 7, 2);
    L.position.set(0, 2.2, 0.9);
    g.add(L);
    neonLights.push(L);
    scene.add(g);
  })();

  // rim / neon poles
  function pole(x, z, color) {
    const g = new THREE.Group();
    g.position.set(x, 0, z);
    g.add(box(0.16, 4.2, 0.16, 0x1a1c30).translateY(2.1));
    g.add(
      box(0.3, 0.3, 0.3, 0x0e1018, {
        emissive: color,
        emissiveIntensity: 2,
      }).translateY(4.2),
    );
    const L = new THREE.PointLight(color, 0.4, 9, 2);
    L.position.set(0, 4.2, 0);
    g.add(L);
    neonLights.push(L);
    scene.add(g);
  }
  pole(-11, 11, NE.cyan);
  pole(11, 11, NE.pink);

  // ---- Labels ----------------------------------------------------------------
  function makeLabel(text, cls) {
    const d = document.createElement('div');
    d.className = 'lbl ' + (cls || '');
    d.textContent = text;
    return new CSS2DObject(d);
  }
  function stationLabel(text, pos, y) {
    const l = makeLabel(text, 'station');
    l.position.set(pos.x, y, pos.z);
    scene.add(l);
  }

  // ---- Voxel people ----------------------------------------------------------
  function person(hex, name) {
    const g = new THREE.Group();
    g.add(box(0.5, 0.28, 0.5, 0x111325).translateY(0.14)); // shadow-ish base
    g.add(box(0.34, 0.36, 0.34, 0x1a1c30).translateY(0.32).translateX(-0.14)); // legs
    g.add(box(0.34, 0.36, 0.34, 0x1a1c30).translateY(0.32).translateX(0.14));
    const body = box(0.78, 0.86, 0.6, hex);
    body.position.y = 0.94;
    g.add(body);
    const head = box(0.62, 0.62, 0.58, 0xefe7dc);
    head.position.y = 1.68;
    g.add(head);
    const visor = box(0.5, 0.16, 0.03, 0x0e1018, {
      emissive: hex,
      emissiveIntensity: 1.4,
    });
    visor.position.set(0, 1.72, 0.3);
    g.add(visor);
    scene.add(g);
    let label = null;
    if (name && name !== 'admin') {
      label = makeLabel(name);
      label.position.set(0, 2.35, 0);
      g.add(label);
    }
    return {
      group: g,
      headMat: head.material,
      visorMat: visor.material,
      label,
    };
  }

  // ---- Live state ------------------------------------------------------------
  const people = new Map();
  const queue = [];
  const balances = new Map();
  const colorOf = (() => {
    let i = 0;
    const m = {};
    return (a) => (m[a] ??= PALETTE[i++ % PALETTE.length]);
  })();
  const hex6 = (n) => '#' + n.toString(16).padStart(6, '0');
  let day = 0;

  function ensure(actor) {
    if (people.has(actor)) return people.get(actor);
    const p = person(colorOf(actor), actor);
    p.color = colorOf(actor);
    p.idx = people.size;
    p.group.position.set(S.entrance.x, 0, S.entrance.z);
    people.set(actor, p);
    return p;
  }
  function handle(e) {
    if (typeof e.day === 'number' && e.day !== day) {
      day = e.day;
      document.getElementById('day').textContent = 'Day ' + day;
    }
    if (e.kind === 'finding') return addFinding(e.detail);
    if (e.actor === 'admin') {
      if (e.kind === 'admin_picked_up' && e.detail?.customer) {
        const i = queue.indexOf(e.detail.customer);
        if (i >= 0) queue.splice(i, 1);
      }
      return renderQueue();
    }
    if (e.kind === 'complained' && !queue.includes(e.actor))
      queue.push(e.actor);
    if (e.detail?.balance != null) balances.set(e.actor, e.detail.balance);
    const p = ensure(e.actor);
    const t = targetFor(e);
    // pull_result shows the outcome where they stand — don't yank them to slot1
    if (e.kind !== 'pull_result') {
      p.tx = t.s.x;
      p.tz = t.s.z;
    }
    p.mood = t.mood;
    p.action = e.kind;
    p.lastT = clock.elapsedTime;
    p.idle = false;
    renderQueue();
    renderCustomers();
  }
  function addFinding(f) {
    const box = document.getElementById('findings');
    if (box.classList.contains('muted')) {
      box.classList.remove('muted');
      box.innerHTML = '';
    }
    const el = document.createElement('div');
    el.className = 'f sev-' + (f?.severity || 'low');
    el.textContent = `[${f?.category || '?'}] ${f?.summary || ''}`;
    box.prepend(el);
  }
  function renderQueue() {
    document.getElementById('qdepth').textContent = queue.length;
    const b = document.getElementById('queue');
    b.classList.toggle('muted', !queue.length);
    b.innerHTML = queue.length
      ? queue
          .map(
            (a) =>
              `<div class="row"><span><span class="dot" style="color:${hex6(colorOf(a))}">■</span>${a}</span></div>`,
          )
          .join('')
      : 'empty';
  }
  function renderCustomers() {
    const b = document.getElementById('customers');
    if (!people.size) return;
    b.classList.remove('muted');
    b.innerHTML = [...people.entries()]
      .filter(([a]) => a !== 'admin')
      .map(
        ([a, p]) =>
          `<div class="row"><span><span class="dot" style="color:${hex6(p.color)}">■</span>${a}</span><span class="muted">${balances.get(a) ?? '—'} · ${p.action || ''}</span></div>`,
      )
      .join('');
  }

  // ---- Loop ------------------------------------------------------------------
  const clock = new THREE.Clock();
  const fpsEl = document.getElementById('fps');
  let frames = 0,
    fpsT = 0;
  function tick() {
    const dt = Math.min(clock.getDelta(), 0.05),
      t = clock.elapsedTime;
    for (const p of people.values()) {
      // Never freeze in a slot: if no event for a while, drift to the street
      // front and mill there (spread out by arrival index).
      if (p.lastT != null && t - p.lastT > 5 && !p.idle) {
        p.idle = true;
        p.mood = 'neutral';
        const i = p.idx || 0;
        p.tx = -6 + (i % 6) * 2.4;
        p.tz = 11 + (i % 2) * 1.3;
      }
      if (p.tx != null) {
        p.group.position.x +=
          (p.tx - p.group.position.x) * Math.min(1, dt * 2.4);
        p.group.position.z +=
          (p.tz - p.group.position.z) * Math.min(1, dt * 2.4);
      }
      const busy = p.action === 'played_pack' || p.mood === 'busy';
      p.group.position.y = busy ? Math.abs(Math.sin(t * 6)) * 0.12 : 0;
      const mc = MOOD[p.mood] ?? MOOD.neutral;
      p.headMat.color.setHex(mc);
      p.headMat.emissive.setHex(p.mood === 'neutral' ? 0x000000 : mc);
      p.headMat.emissiveIntensity = p.mood === 'neutral' ? 0 : 0.6;
      if (p.visorMat)
        p.visorMat.emissiveIntensity = 1.2 + Math.sin(t * 4) * 0.3;
    }
    screens.forEach(
      (s, i) =>
        (s.material.emissiveIntensity = 1.8 + Math.sin(t * 3 + i) * 0.4),
    );
    neonLights.forEach((L, i) => (L.intensity = L.intensity)); // steady
    controls.update();
    composer.render();
    labelRenderer.render(scene, camera);
    frames++;
    if (t - fpsT >= 0.5) {
      fpsEl.textContent = Math.round(frames / (t - fpsT)) + ' fps';
      frames = 0;
      fpsT = t;
    }
    requestAnimationFrame(tick);
  }
  function resize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
    labelRenderer.setSize(innerWidth, innerHeight);
  }
  // Keep at most 8 real point lights (perf), dampen the rest for mood.
  neonLights.splice(8).forEach((L) => L.parent && L.parent.remove(L));
  neonLights.forEach((L) => (L.intensity *= 0.45));
  addEventListener('resize', resize);
  resize();
  tick();

  // ---- Live feed -------------------------------------------------------------
  const es = new EventSource('/events');
  es.onmessage = (m) => {
    try {
      handle(JSON.parse(m.data));
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('badge').textContent = 'PIXELSLOT · reconnecting…';
  };
</script>
